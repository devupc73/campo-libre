services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-campo_libre}
      POSTGRES_USER: ${POSTGRES_USER:-campo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-campo} -d ${POSTGRES_DB:-campo_libre}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-campo_libre}
      POSTGRES_USER: ${POSTGRES_USER:-campo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    build:
      context: ../../mobile
      dockerfile: Dockerfile.web
      args:
        EXPO_PUBLIC_API_URL: https://${API_DOMAIN:?API_DOMAIN is required}
    restart: unless-stopped
    expose:
      - "80"

  system-admin-frontend:
    build:
      context: ../../mobile
      dockerfile: Dockerfile.web
      args:
        EXPO_PUBLIC_API_URL: https://${API_DOMAIN:?API_DOMAIN is required}
    restart: unless-stopped
    ports:
      - "1907:80"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    environment:
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN:?FRONTEND_DOMAIN is required}
      API_DOMAIN: ${API_DOMAIN:?API_DOMAIN is required}
      NGINX_ENVSUBST_FILTER: '^(FRONTEND_DOMAIN|API_DOMAIN)$'
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
