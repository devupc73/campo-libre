name: Deploy AWS EC2

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-aws-ec2-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 25m
          script: |
            set -Eeuo pipefail

            APP_DIR="${{ secrets.EC2_APP_DIR }}"
            APP_DIR="${APP_DIR:-/opt/campo-libre}"
            FRONTEND_DOMAIN="${{ secrets.FRONTEND_DOMAIN }}"
            API_DOMAIN="${{ secrets.API_DOMAIN }}"

            test -n "$FRONTEND_DOMAIN" || { echo "FRONTEND_DOMAIN secret is required"; exit 1; }
            test -n "$API_DOMAIN" || { echo "API_DOMAIN secret is required"; exit 1; }
            test -n "${{ secrets.POSTGRES_PASSWORD }}" || { echo "POSTGRES_PASSWORD secret is required"; exit 1; }
            command -v git >/dev/null || { echo "git is not installed on EC2"; exit 1; }
            command -v docker >/dev/null || { echo "docker is not installed on EC2"; exit 1; }
            docker compose version >/dev/null || { echo "Docker Compose plugin is not installed"; exit 1; }

            if [ ! -d "$APP_DIR/.git" ]; then
              sudo mkdir -p "$APP_DIR"
              sudo chown -R "$USER":"$USER" "$APP_DIR"
              git clone "https://github.com/${{ github.repository }}.git" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --prune origin main
            git reset --hard origin/main
            cd deploy/aws-ec2

            validate_certificate() {
              domain="$1"
              cert_dir="/etc/letsencrypt/live/$domain"

              if ! sudo test -f "$cert_dir/fullchain.pem"; then
                echo "Missing TLS certificate for $domain at $cert_dir/fullchain.pem"
                echo "Available Let's Encrypt certificate directories:"
                sudo find /etc/letsencrypt/live -mindepth 1 -maxdepth 1 -type d -printf ' - %f\n' 2>/dev/null || true
                exit 1
              fi

              if ! sudo test -f "$cert_dir/privkey.pem"; then
                echo "Missing TLS private key for $domain at $cert_dir/privkey.pem"
                exit 1
              fi

              echo "TLS certificate found for $domain"
            }

            validate_certificate "$FRONTEND_DOMAIN"
            validate_certificate "$API_DOMAIN"

            umask 077
            cat > .env <<EOF
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            FRONTEND_DOMAIN=$FRONTEND_DOMAIN
            API_DOMAIN=$API_DOMAIN
            EOF

            docker compose --env-file .env -f docker-compose.prod.yml config --quiet
            docker compose --env-file .env -f docker-compose.prod.yml up -d --build --remove-orphans
            docker compose --env-file .env -f docker-compose.prod.yml ps
            docker compose --env-file .env -f docker-compose.prod.yml exec -T nginx nginx -t
            docker image prune -f
